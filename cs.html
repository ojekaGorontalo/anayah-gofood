<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JeGo - Pesan Antar</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .container { background: white; border-radius: 24px; padding: 24px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
    h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; letter-spacing: -0.5px; }
    .subtitle { color: #7a7a8c; margin-bottom: 24px; font-size: 14px; }
    .input-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #2d2d44; margin-bottom: 6px; }
    input { width: 100%; padding: 14px 16px; font-size: 16px; border: 2px solid #e4e7ec; border-radius: 16px; outline: none; transition: border 0.15s; background: #fafbfc; }
    input:focus { border-color: #e31837; background: white; }
    button { background: #e31837; color: white; font-weight: 700; font-size: 18px; padding: 16px; width: 100%; border: none; border-radius: 60px; cursor: pointer; transition: 0.15s; box-shadow: 0 6px 14px rgba(227,24,55,0.25); margin-top: 10px; }
    button:active { transform: scale(0.98); }
    #status { margin-top: 18px; text-align: center; min-height: 24px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛵 JeGo</h1>
    <div class="subtitle">Pesan antar cepat & aman</div>
    <div class="input-group"><label>👤 Nama Pemesan</label><input id="nama" placeholder="cth. Budi Setiawan" autocomplete="off"></div>
    <div class="input-group"><label>📍 Jemput di</label><input id="dari" placeholder="Alamat lengkap"></div>
    <div class="input-group"><label>🎯 Antar ke</label><input id="ke" placeholder="Alamat tujuan"></div>
    <button onclick="kirimPesanan()">Pesan Sekarang</button>
    <div id="status"></div>
  </div>
  <script>
    // Ganti dengan URL Web App Apps Script Anda (akhiran /exec)
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbx6AbzaS2_qBgE1PM85rANE28t8XCfeRXChcWwdthmYGIAPFEtkSGIUYZgqSJ6kv88yUg/exec';

    async function kirimPesanan() {
      const nama = document.getElementById('nama').value.trim();
      const dari = document.getElementById('dari').value.trim();
      const ke = document.getElementById('ke').value.trim();
      const statusEl = document.getElementById('status');
      
      if (!nama || !dari || !ke) {
        statusEl.innerHTML = '⚠️ Lengkapi semua data';
        return;
      }
      
      statusEl.innerHTML = '⏳ Mengirim pesanan...';
      
      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customerName: nama, from: dari, to: ke })
        });
        
        const result = await response.json();
        
        if (result.success) {
          statusEl.innerHTML = '✅ Pesanan tercatat! Driver segera menjemput.';
          document.getElementById('nama').value = '';
          document.getElementById('dari').value = '';
          document.getElementById('ke').value = '';
        } else {
          statusEl.innerHTML = `❌ Gagal: ${result.error}`;
        }
      } catch (error) {
        statusEl.innerHTML = `❌ Jaringan error: ${error.message}`;
      }
    }
  </script>
</body>
</html>
