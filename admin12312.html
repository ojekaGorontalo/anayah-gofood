<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lapak Inayah - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#f5f7fa; }
        .container { max-width:1400px; margin:0 auto; padding:20px; }
        .admin-header { background:linear-gradient(135deg,#2c3e50,#34495e); color:white; padding:20px; border-radius:10px; margin-bottom:30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-bottom:30px; }
        .stat-card { background:white; padding:15px; border-radius:10px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        .stat-icon { width:45px; height:45px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-size:1.4rem; }
        .tabs { display:flex; background:white; border-radius:10px 10px 0 0; overflow-x:auto; }
        .tab { padding:12px 20px; cursor:pointer; font-weight:600; border-bottom:3px solid transparent; white-space:nowrap; }
        .tab.active { border-bottom-color:#e74c3c; color:#e74c3c; }
        .tab-content { display:none; background:white; padding:25px; border-radius:0 0 10px 10px; box-shadow:0 2px 5px rgba(0,0,0,0.05); margin-bottom:30px; }
        .tab-content.active { display:block; }
        .orders-table { width:100%; border-collapse:collapse; overflow-x:auto; display:block; }
        .orders-table th, .orders-table td { padding:12px; text-align:left; border-bottom:1px solid #eee; vertical-align:top; }
        .order-status { display:inline-block; padding:4px 12px; border-radius:20px; font-size:0.8rem; font-weight:600; }
        .status-pending { background:#fff3cd; color:#856404; }
        .status-processing { background:#d1ecf1; color:#0c5460; }
        .status-ready { background:#e0d4ff; color:#6c5ce7; }
        .status-delivering { background:#ffe0b5; color:#e67e22; }
        .status-completed { background:#d4edda; color:#155724; }
        .action-btn { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; margin:2px; font-size:0.75rem; }
        .btn-process { background:#3498db; color:white; }
        .btn-ready { background:#9b59b6; color:white; }
        .btn-deliver { background:#e67e22; color:white; }
        .btn-complete { background:#2ecc71; color:white; }
        .btn-cancel { background:#e74c3c; color:white; }
        .btn-whatsapp { background:#25D366; color:white; }
        .menu-list-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
        .menu-card { background:#f8f9fa; border-radius:10px; padding:15px; display:flex; gap:15px; align-items:center; }
        .menu-card-img { width:70px; height:70px; object-fit:cover; border-radius:8px; }
        .stock-input { width:80px; padding:5px; border:1px solid #ddd; border-radius:5px; }
        .toggle-switch { display:inline-block; position:relative; width:50px; height:24px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ccc; transition:.3s; border-radius:24px; }
        .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; border-radius:50%; transition:.3s; }
        input:checked + .slider { background-color:#2ecc71; }
        input:checked + .slider:before { transform:translateX(26px); }
        @media (max-width:768px) { .orders-table { font-size:0.8rem; } .orders-table th, .orders-table td { padding:6px; } }
        .loading, .no-data { text-align:center; padding:30px; color:#999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <div><i class="fas fa-user-shield"></i> <strong>Lapak Inayah Admin</strong></div>
            <div><label style="margin-right:10px;">Status Warung</label> <label class="toggle-switch"><input type="checkbox" id="storeToggle"><span class="slider"></span></label> <span id="storeStatusText">Memuat...</span></div>
            <div><button id="logoutBtn" class="action-btn btn-cancel" style="background:#e74c3c;">Logout</button></div>
        </div>
        <div class="stats-grid" id="statsContainer"></div>
        <div class="tabs"><div class="tab active" data-tab="orders">📦 Pesanan</div><div class="tab" data-tab="menu">🍽️ Kelola Menu</div></div>
        <div class="tab-content active" id="ordersTab"><div id="ordersContainer"><div class="loading">Memuat...</div></div></div>
        <div class="tab-content" id="menuTab">
            <div class="section-header" style="display:flex; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                <h2>📋 Daftar Menu</h2>
                <button id="addMenuBtn" class="action-btn btn-complete" style="padding:8px 16px;"><i class="fas fa-plus"></i> Tambah Menu Baru</button>
            </div>
            <div id="menuListContainer"></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDa3JXfyzGgVyzBqf0uL_P-DuU97RhhTv8", 
            authDomain: "game-balap-simpel.firebaseapp.com", 
            databaseURL: "https://game-balap-simpel-default-rtdb.firebaseio.com", 
            projectId: "game-balap-simpel" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let menu = []; // akan selalu berupa array

        // Auth sederhana
        if(!localStorage.getItem('lapak_admin')) { 
            const pwd = prompt("Masukkan password admin:"); 
            if(pwd === 'LapakInayah123') {
                localStorage.setItem('lapak_admin', 'true');
            } else { 
                alert("Akses ditolak!"); 
                window.location.href = 'warungq.html'; 
            } 
        }
        
        // Status Warung
        db.ref('Lapak Inayah/settings/isOpen').on('value', snap => { 
            let open = snap.val() === true; 
            document.getElementById('storeToggle').checked = open; 
            document.getElementById('storeStatusText').innerText = open ? "🟢 Buka" : "🔴 Tutup"; 
        });
        document.getElementById('storeToggle').addEventListener('change', e => { 
            db.ref('Lapak Inayah/settings/isOpen').set(e.target.checked); 
        });
        
        // Stats & Orders
        function loadOrders() {
            db.ref('Lapak Inayah/orders').on('value', snap => {
                let orders = snap.val() || {};
                let stats = { pending:0, processing:0, ready:0, delivering:0, completed:0 };
                Object.values(orders).forEach(o => { if(stats[o.status] !== undefined) stats[o.status]++; });
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card"><div class="stat-icon" style="background:#f39c12;">⏳</div><div><h3>${stats.pending}</h3><p>Menunggu</p></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#3498db;">🔄</div><div><h3>${stats.processing}</h3><p>Diproses</p></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#9b59b6;">📦</div><div><h3>${stats.ready}</h3><p>Siap</p></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#e67e22;">🚚</div><div><h3>${stats.delivering}</h3><p>Dikirim</p></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#2ecc71;">✅</div><div><h3>${stats.completed}</h3><p>Selesai</p></div></div>
                `;
                renderOrders(orders);
            });
        }
        
        function renderOrders(orders) {
            let html = `<div style="overflow-x:auto"><table class="orders-table"><thead>\\
<th>ID</th><th>Customer</th><th>Alamat</th><th>Total</th><th>Status</th><th>Aksi</th>\\
</thead><tbody>`;
            Object.entries(orders).sort((a,b)=>b[1].timestamp - a[1].timestamp).forEach(([id,o]) => {
                let alamat = o.destination_address || o.customer?.address || '-';
                let mapLink = (o.destination_lat && o.destination_lng) ? `<a href="https://maps.google.com/?q=${o.destination_lat},${o.destination_lng}" target="_blank"><i class="fas fa-map-marker-alt"></i> Lokasi</a>` : '';
                let statusClass = `status-${o.status}`;
                let statusText = { pending:'Menunggu', processing:'Diproses', ready:'Siap', delivering:'Dikirim', completed:'Selesai' }[o.status];
                let buttons = '';
                if(o.status === 'pending') buttons = `<button class="action-btn btn-process" onclick="updateStatus('${id}','processing')">Proses</button>`;
                else if(o.status === 'processing') buttons = `<button class="action-btn btn-ready" onclick="updateStatus('${id}','ready')">Siap</button>`;
                else if(o.status === 'ready') buttons = `<button class="action-btn btn-deliver" onclick="updateStatus('${id}','delivering')">Kirim</button>`;
                else if(o.status === 'delivering') buttons = `<button class="action-btn btn-complete" onclick="updateStatus('${id}','completed')">Selesai</button>`;
                buttons += ` <a href="https://wa.me/${o.customer?.phone?.replace(/\D/g,'')}?text=Halo%20pesanan%20${id}" target="_blank" class="action-btn btn-whatsapp" style="background:#25D366;">WA</a>`;
                html += `<tr>\\
<td>${id}</td>\\
<td>${o.customer?.name}<br><small>${o.customer?.phone}</small></td>\\
<td>${alamat}<br>${mapLink}</td>\\
<td>Rp ${(o.total||0).toLocaleString()}</td>\\
<td><span class="order-status ${statusClass}">${statusText}</span></td>\\
<td>${buttons}</td>\\
</tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('ordersContainer').innerHTML = html;
        }
        
        window.updateStatus = (id, newStatus) => {
            if(confirm(`Ubah status pesanan ${id} menjadi ${newStatus.toUpperCase()}?`)) {
                db.ref(`Lapak Inayah/orders/${id}/status`).set(newStatus);
                db.ref(`Lapak Inayah/orders/${id}/statusHistory`).push({ 
                    status: newStatus, 
                    timestamp: Date.now(), 
                    description: `Status diubah ke ${newStatus}` 
                });
            }
        };
        
        // ========== MANAJEMEN MENU (SEBAGAI ARRAY) ==========
        function loadMenu() {
            db.ref('Lapak Inayah/menu').on('value', snap => {
                const data = snap.val();
                // Konversi ke array jika data berupa object (push ID) atau langsung array
                if (Array.isArray(data)) {
                    menu = data;
                } else if (data && typeof data === 'object') {
                    // Ubah object dengan key acak menjadi array
                    menu = Object.values(data);
                } else {
                    menu = [];
                }
                renderMenuList();
            });
        }
        
        function renderMenuList() {
            const container = document.getElementById('menuListContainer');
            if(!menu.length) {
                container.innerHTML = '<div class="no-data">Belum ada menu. Klik "Tambah Menu Baru" untuk menambahkan.</div>';
                return;
            }
            let html = `<div class="menu-list-grid">`;
            menu.forEach((item, idx) => {
                html += `
                    <div class="menu-card">
                        <img src="${item.gambar || 'https://via.placeholder.com/70'}" class="menu-card-img" onerror="this.src='https://via.placeholder.com/70'">
                        <div style="flex:1">
                            <h4>${escapeHtml(item.nama)}</h4>
                            <p style="color:#e74c3c; font-weight:bold;">Rp ${item.harga.toLocaleString()}</p>
                            <p style="font-size:0.8rem; color:#666;">${escapeHtml(item.deskripsi) || '-'}</p>
                            <div style="display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap;">
                                <label>Stok:</label>
                                <input type="number" id="stock-${idx}" value="${item.stock ?? 0}" class="stock-input" min="0" onchange="updateStock(${idx}, this.value)">
                                <button class="action-btn btn-process" onclick="editMenu(${idx})"><i class="fas fa-edit"></i> Edit</button>
                                <button class="action-btn btn-cancel" onclick="deleteMenu(${idx})"><i class="fas fa-trash"></i> Hapus</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        window.updateStock = (idx, val) => {
            if(!menu[idx]) return;
            menu[idx].stock = parseInt(val) || 0;
            // Simpan seluruh array menu
            db.ref('Lapak Inayah/menu').set(menu);
        };
        
        window.editMenu = (idx) => {
            let item = menu[idx];
            if(!item) return;
            let newName = prompt("Nama menu:", item.nama);
            if(!newName) return;
            let newPrice = prompt("Harga (angka):", item.harga);
            if(!newPrice || isNaN(newPrice)) return alert("Harga harus angka");
            let newDesc = prompt("Deskripsi:", item.deskripsi || "");
            let newImg = prompt("URL Gambar (opsional):", item.gambar || "");
            let newStock = prompt("Stok:", item.stock ?? 0);
            
            menu[idx] = {
                nama: newName,
                harga: parseInt(newPrice),
                deskripsi: newDesc || "",
                gambar: newImg || "",
                stock: parseInt(newStock) || 0
            };
            db.ref('Lapak Inayah/menu').set(menu);
        };
        
        window.deleteMenu = (idx) => {
            if(confirm("Yakin ingin menghapus menu ini?")) {
                menu.splice(idx, 1);
                db.ref('Lapak Inayah/menu').set(menu);
            }
        };
        
        // Tambah Menu dengan prompt
        document.getElementById('addMenuBtn').addEventListener('click', () => {
            let nama = prompt("Nama Menu:", "");
            if(!nama) {
                alert("Nama menu wajib diisi!");
                return;
            }
            let harga = prompt("Harga (angka):", "");
            if(!harga || isNaN(harga)) {
                alert("Harga harus diisi dengan angka!");
                return;
            }
            let deskripsi = prompt("Deskripsi (opsional):", "");
            let gambar = prompt("URL Gambar (opsional, kosongkan jika tidak ada):", "");
            let stok = prompt("Stok awal:", "10");
            if(!stok || isNaN(stok)) stok = 10;
            
            const newItem = {
                nama: nama,
                harga: parseInt(harga),
                deskripsi: deskripsi || "",
                gambar: gambar || "",
                stock: parseInt(stok) || 0
            };
            menu.push(newItem);
            db.ref('Lapak Inayah/menu').set(menu)
                .then(() => alert("Menu berhasil ditambahkan!"))
                .catch(err => alert("Gagal menambahkan menu: " + err.message));
        });
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => { 
            tab.addEventListener('click',()=>{ 
                document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
                tab.classList.add('active'); 
                document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); 
                document.getElementById(tab.dataset.tab+'Tab').classList.add('active'); 
            }); 
        });
        
        document.getElementById('logoutBtn').addEventListener('click',()=>{ 
            localStorage.removeItem('lapak_admin'); 
            window.location.href = 'warungq.html'; 
        });
        
        loadOrders(); 
        loadMenu();
    </script>
</body>
</html>
